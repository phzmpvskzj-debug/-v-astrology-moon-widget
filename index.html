<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V. Astrology — Небето в момента</title>
<style>
:root{
  --bg1:#faf6f1;
  --bg2:#eaf2f8;
  --ink:#26313c;
  --muted:#6e7882;
  --line:rgba(38,49,60,.10);
  --card:rgba(255,255,255,.80);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 18% 12%,rgba(255,255,255,.95),transparent 32%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
  display:grid;
  place-items:center;
}
.wrap{width:min(900px,97vw);padding:18px}
.card{
  min-height:330px;
  border:1px solid rgba(255,255,255,.88);
  border-radius:28px;
  background:var(--card);
  box-shadow:0 18px 50px rgba(42,56,70,.12);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  display:grid;
  grid-template-columns:250px 1fr;
  align-items:center;
  gap:30px;
  padding:30px 34px;
  overflow:hidden;
}
.moon-area{display:grid;place-items:center}
.moon{
  width:165px;
  height:165px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 35% 30%,rgba(255,255,255,.18),transparent 45%),
    url("https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/lroc_color_2k.jpg");
  background-size:330% 165%;
  background-position:50% 50%;
  box-shadow:
    inset -12px -8px 24px rgba(100,110,120,.14),
    0 14px 34px rgba(50,62,73,.18);
}
#moonShadow{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border-radius:50%;
  pointer-events:none;
}
.eyebrow{
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
  font-weight:650;
}
h1{
  font-size:33px;
  line-height:1.1;
  margin:0 0 7px;
  font-weight:700;
  letter-spacing:-.02em;
}
.date{font-size:15px;color:var(--muted);margin-bottom:18px}
.sky{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px 14px;
  padding:15px 0;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.sky-item,.stat{
  background:rgba(255,255,255,.45);
  border-radius:14px;
  padding:10px 12px;
}
.sky-item b,.stat b{
  display:block;
  font-size:16px;
  margin-bottom:3px;
}
.sky-item span,.stat span{font-size:11px;color:var(--muted)}
.stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
}
.footer{margin-top:13px;font-size:10.5px;color:var(--muted)}
@media(max-width:680px){
  .card{
    grid-template-columns:1fr;
    text-align:center;
    padding:24px 18px;
    gap:18px;
  }
  .moon{width:150px;height:150px}
  .sky,.stats{text-align:left}
  .stats{grid-template-columns:1fr 1fr}
  .stats .stat:first-child{grid-column:1/-1}
  h1{font-size:28px}
}
</style>
</head>
<body>
<main class="wrap">
  <section class="card">
    <div class="moon-area">
      <div class="moon">
        <canvas id="moonShadow" width="330" height="330"></canvas>
      </div>
    </div>

    <div>
      <div class="eyebrow">V. Astrology · Небето в момента</div>
      <h1 id="phaseName">Нарастваща Луна</h1>
      <div class="date" id="dateText"></div>

      <div class="sky">
        <div class="sky-item">
          <b id="moonSign">☽ —</b>
          <span>Луната е в знак</span>
        </div>
        <div class="sky-item">
          <b id="sunSign">☉ —</b>
          <span>Слънцето е в знак</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <b id="illumination">—</b>
          <span>✨ Осветеност</span>
        </div>
        <div class="stat">
          <b id="nextNew">—</b>
          <span>🗓️ Следващо новолуние</span>
        </div>
        <div class="stat">
          <b id="nextFull">—</b>
          <span>🌕 Следващо пълнолуние</span>
        </div>
      </div>

      <div class="footer">
        Обновява се автоматично · тропически зодиак · ориентировъчни астрономически изчисления
      </div>
    </div>
  </section>
</main>

<script>
(function(){
  const DEG=Math.PI/180;
  const RAD=180/Math.PI;
  const DAY=86400000;
  const SYNODIC=29.530588853;
  const norm=x=>((x%360)+360)%360;

  const signs=[
    "Овен","Телец","Близнаци","Рак","Лъв","Дева",
    "Везни","Скорпион","Стрелец","Козирог","Водолей","Риби"
  ];
  const glyphs=["♈︎","♉︎","♊︎","♋︎","♌︎","♍︎","♎︎","♏︎","♐︎","♑︎","♒︎","♓︎"];
  const signLabel=lon=>{
    const index=Math.floor(norm(lon)/30);
    return glyphs[index]+" "+signs[index];
  };

  const now=new Date();
  const jd=now.getTime()/DAY+2440587.5;
  const d=jd-2451543.5;

  // Ориентировъчна тропическа дължина на Слънцето
  const ws=norm(282.9404+4.70935e-5*d);
  const es=0.016709-1.151e-9*d;
  const Ms=norm(356.0470+0.9856002585*d);
  const Es=Ms+RAD*es*Math.sin(Ms*DEG)*(1+es*Math.cos(Ms*DEG));
  const xs=Math.cos(Es*DEG)-es;
  const ys=Math.sqrt(1-es*es)*Math.sin(Es*DEG);
  const vs=Math.atan2(ys,xs)*RAD;
  const sunLon=norm(vs+ws);

  // Ориентировъчна тропическа дължина на Луната
  const N=norm(125.1228-0.0529538083*d);
  const w=norm(318.0634+0.1643573223*d);
  const a=60.2666;
  const e=0.054900;
  const M=norm(115.3654+13.0649929509*d);
  const E=M+RAD*e*Math.sin(M*DEG)*(1+e*Math.cos(M*DEG));
  const x=a*(Math.cos(E*DEG)-e);
  const y=a*Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(y,x)*RAD;
  let lon=norm(v+w);

  const Ls=norm(Ms+ws);
  const Lm=norm(M+w+N);
  const D=norm(Lm-Ls);
  const F=norm(Lm-N);

  lon += -1.274*Math.sin((M-2*D)*DEG)
    +0.658*Math.sin((2*D)*DEG)
    -0.186*Math.sin(Ms*DEG)
    -0.059*Math.sin((2*M-2*D)*DEG)
    -0.057*Math.sin((M-2*D+Ms)*DEG)
    +0.053*Math.sin((M+2*D)*DEG)
    +0.046*Math.sin((2*D-Ms)*DEG)
    +0.041*Math.sin((M-Ms)*DEG)
    -0.035*Math.sin(D*DEG)
    -0.031*Math.sin((M+Ms)*DEG)
    -0.015*Math.sin((2*F-2*D)*DEG)
    +0.011*Math.sin((M-4*D)*DEG);

  const moonLon=norm(lon);

  // Проверена отправна точка: новолуние на 12 август 2026, 17:37 UTC
  const referenceNewMoon=new Date("2026-08-12T17:37:00Z");
  const cycles=(now-referenceNewMoon)/(SYNODIC*DAY);
  const phase=((cycles%1)+1)%1;
  const illumination=(1-Math.cos(2*Math.PI*phase))/2;

  function phaseName(p){
  const light=(1-Math.cos(2*Math.PI*p))/2;

  if(light<0.02)return "Новолуние";
  if(light>0.98)return "Пълнолуние";

  if(p<0.5){
    if(light<0.45)return "Нарастващ сърп";
    if(light<=0.55)return "Първа четвърт";
    return "Нарастваща Луна";
  }

  if(light>0.55)return "Намаляваща Луна";
  if(light>=0.45)return "Последна четвърт";
  return "Намаляващ сърп";
}
  }

  function nextEvent(targetPhase){
    let delta=targetPhase-phase;
    if(delta<=0)delta+=1;
    return new Date(now.getTime()+delta*SYNODIC*DAY);
  }

  const shortDate=new Intl.DateTimeFormat("bg-BG",{
    day:"numeric",
    month:"long"
  });
  const fullDate=new Intl.DateTimeFormat("bg-BG",{
    weekday:"long",
    day:"numeric",
    month:"long",
    year:"numeric"
  });

  document.getElementById("phaseName").textContent=phaseName(phase);
  document.getElementById("dateText").textContent=fullDate.format(now);
  document.getElementById("moonSign").textContent="☽ "+signLabel(moonLon);
  document.getElementById("sunSign").textContent="☉ "+signLabel(sunLon);
  document.getElementById("illumination").textContent=Math.round(illumination*100)+"%";
  document.getElementById("nextNew").textContent=shortDate.format(nextEvent(0));
  document.getElementById("nextFull").textContent=shortDate.format(nextEvent(.5));

  // Реалистичен извит терминатор върху текстурата
  const canvas=document.getElementById("moonShadow");
  const ctx=canvas.getContext("2d");
  const size=canvas.width;
  const center=size/2;
  const radius=center;
  const image=ctx.createImageData(size,size);
  const pixels=image.data;
  const angle=2*Math.PI*phase;

  for(let py=0;py<size;py++){
    for(let px=0;px<size;px++){
      const nx=(px+.5-center)/radius;
      const ny=(py+.5-center)/radius;
      const r2=nx*nx+ny*ny;
      if(r2>1)continue;

      const nz=Math.sqrt(1-r2);
      const light=nx*Math.sin(angle)-nz*Math.cos(angle);
      const softness=.025;
      const darkness=Math.max(0,Math.min(1,(-light+softness)/(softness*2)));
      const index=(py*size+px)*4;

      pixels[index]=13;
      pixels[index+1]=19;
      pixels[index+2]=27;
      pixels[index+3]=Math.round(232*darkness);
    }
  }

  ctx.putImageData(image,0,0);
})();
</script>
</body>
</html>
