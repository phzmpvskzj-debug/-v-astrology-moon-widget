<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V. Astrology — Фаза на Луната</title>
<style>
:root{--bg1:#f8f5f0;--bg2:#eaf1f7;--ink:#26313c;--muted:#6e7882;--line:rgba(38,49,60,.10);--card:rgba(255,255,255,.78)}
*{box-sizing:border-box}html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2));display:grid;place-items:center}
.wrap{width:min(760px,96vw);padding:20px}
.card{min-height:300px;border:1px solid rgba(255,255,255,.85);border-radius:28px;background:var(--card);box-shadow:0 18px 50px rgba(42,56,70,.12);display:grid;grid-template-columns:250px 1fr;align-items:center;gap:28px;padding:30px 34px}
.moon-area{display:grid;place-items:center}.moon{width:185px;height:185px;border-radius:50%;position:relative;overflow:hidden;background:#f7f7f3;box-shadow:inset -16px -10px 28px rgba(130,140,150,.18),0 14px 34px rgba(50,62,73,.18)}
.moon:before{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 33% 30%,rgba(160,166,172,.18) 0 5%,transparent 6%),radial-gradient(circle at 62% 58%,rgba(155,162,168,.13) 0 7%,transparent 8%),radial-gradient(circle at 48% 72%,rgba(135,143,150,.10) 0 4%,transparent 5%);z-index:2}
.shadow{position:absolute;inset:-1px;border-radius:50%;background:#18212b;opacity:.93;transform-origin:center}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:650}
h1{font-size:34px;line-height:1.1;margin:0 0 8px;font-weight:700}.date{font-size:15px;color:var(--muted);margin-bottom:22px}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 18px;padding-top:18px;border-top:1px solid var(--line)}
.stat b{display:block;font-size:17px;margin-bottom:3px}.stat span{font-size:12px;color:var(--muted)}.footer{margin-top:18px;font-size:11px;color:var(--muted)}
@media(max-width:620px){.card{grid-template-columns:1fr;text-align:center;padding:24px 18px}.moon{width:150px;height:150px}.stats{text-align:left}h1{font-size:28px}}
</style>
</head>
<body>
<main class="wrap"><section class="card">
<div class="moon-area"><div class="moon"><div class="shadow" id="shadow"></div></div></div>
<div><div class="eyebrow">V. Astrology · Лунен ритъм</div><h1 id="phaseName">Фаза на Луната</h1><div class="date" id="dateText"></div>
<div class="stats">
<div class="stat"><b id="illumination">—</b><span>Осветеност</span></div>
<div class="stat"><b id="age">—</b><span>Лунна възраст</span></div>
<div class="stat"><b id="nextFull">—</b><span>Следващо пълнолуние</span></div>
<div class="stat"><b id="nextNew">—</b><span>Следващо новолуние</span></div>
</div><div class="footer">Обновява се автоматично според датата на устройството</div></div>
</section></main>
<script>
(function(){
const S=29.530588853,E=Date.UTC(2000,0,6,18,14,0),now=new Date();
let age=(((now-E)/86400000)%S+S)%S,p=age/S,illum=(1-Math.cos(2*Math.PI*p))/2;
function name(p){if(p<.033||p>=.967)return"Новолуние";if(p<.217)return"Нарастващ сърп";if(p<.283)return"Първа четвърт";if(p<.467)return"Нарастваща Луна";if(p<.533)return"Пълнолуние";if(p<.717)return"Намаляваща Луна";if(p<.783)return"Последна четвърт";return"Намаляващ сърп"}
function next(t){let d=t-age;if(d<=0)d+=S;return new Date(now.getTime()+d*86400000)}
const f=new Intl.DateTimeFormat("bg-BG",{day:"numeric",month:"long"}),fl=new Intl.DateTimeFormat("bg-BG",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
phaseName.textContent=name(p);dateText.textContent=fl.format(now);illumination.textContent=Math.round(illum*100)+"%";age.textContent=age.toFixed(1)+" дни";nextFull.textContent=f.format(next(S/2));nextNew.textContent=f.format(next(0));
let x,sx;if(p<=.5){x=-100+p*400;sx=Math.abs(Math.cos(Math.PI*p))}else{x=100-(p-.5)*400;sx=Math.abs(Math.cos(Math.PI*p))}
shadow.style.transform=`translateX(${x}%) scaleX(${Math.max(sx,.03)})`;shadow.style.background=p<.5?"#18212b":"#f7f7f3";
})();
</script>
</body></html>
